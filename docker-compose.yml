version: "3.9"

services:
  db:
    image: kartoza/postgis:15-3.3
    environment:
      POSTGRES_DB: geodjango
      POSTGRES_USER: postgres
      POSTGRES_PASS: postgres
      ALLOW_IP_RANGE: "0.0.0.0/0"
    volumes:
      - pg_data:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geodjango"]
      interval: 10s
      timeout: 5s
      retries: 15

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DB_NAME: geodjango
      DB_USER: postgres
      DB_PASS: postgres
      DB_HOST: db
      DB_PORT: "5432"
      DEBUG: "1"
      SECRET_KEY: "django-dev-secret-key-change-in-production"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
